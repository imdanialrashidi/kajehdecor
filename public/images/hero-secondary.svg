<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9F5F0"/>
      <stop offset="100%" style="stop-color:#E0D5C8"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#C4B5A0" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#dots)"/>
  <text x="400" y="220" text-anchor="middle" font-family="Vazirmatn, Tahoma, sans-serif" font-size="80" fill="#2C2C2C" opacity="0.15">🛋</text>
  <text x="400" y="280" text-anchor="middle" font-family="Vazirmatn, Tahoma, sans-serif" font-size="22" font-weight="700" fill="#8B6F47">نشیمن و پذیرایی</text>
  <text x="400" y="320" text-anchor="middle" font-family="Vazirmatn, Tahoma, sans-serif" font-size="13" fill="#2C2C2C" opacity="0.5">طراحی داخلی مدرن و کاربردی</text>
  <text x="400" y="360" text-anchor="middle" font-family="Vazirmatn, Tahoma, sans-serif" font-size="11" fill="#C4B5A0">hero-secondary</text>
</svg>